<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmacao Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: #1a1a1a;
            border: 2px solid #ffd700;
            border-radius: 8px;
            width: 100%;
            max-width: 420px;
            padding: 32px;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.25);
        }

        h1 {
            color: #ffd700;
            font-size: 22px;
            margin-bottom: 10px;
            text-align: center;
        }

        p {
            color: #ddd;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
        }

        label {
            display: block;
            color: #ffd700;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #333;
            border-radius: 5px;
            background: #222;
            color: #fff;
            margin-bottom: 14px;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #ffd700;
        }

        .error {
            background: #3a1a1a;
            color: #ff8a8a;
            border-left: 4px solid #f44336;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background: #ffd700;
            color: #000;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #ffed4e;
        }

        .link {
            display: inline-block;
            margin-top: 12px;
            color: #bbb;
            text-decoration: none;
            font-size: 13px;
        }

        .actions {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Confirmacao de Admin</h1>
        <p>Digite a senha de admin para acessar esta tela.</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/admin/access">
            <input type="hidden" name="next" value="{{ next_path }}">

            <label for="senha">Senha de admin</label>
            <input id="senha" type="password" name="senha" required autofocus>

            <button type="submit">Liberar acesso</button>
        </form>

        <div class="actions">
            <a class="link" href="/">Voltar ao inicio</a>
        </div>
    </div>
</body>
</html>
