<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Gold - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: #1a1a1a;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border: 2px solid #ffd700;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #ffd700;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .logo p {
            color: #bbb;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #333;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            color: #888;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .tab.active {
            border-bottom-color: #ffd700;
            color: #ffd700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ffd700;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #333;
            background: #222;
            color: #fff;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        .form-content {
            display: none;
        }

        .form-content.active {
            display: block;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
            background: #ffed4e;
        }

        button:active {
            transform: translateY(0);
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            border-left: 4px solid transparent;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background-color: #1a3a1a;
            color: #84d684;
            border-left-color: #4caf50;
        }

        .alert-error {
            background-color: #3a1a1a;
            color: #ff6b6b;
            border-left-color: #f44336;
        }

        .alert-info {
            background-color: #1a2a3a;
            color: #64b5f6;
            border-left-color: #2196f3;
        }

        .first-user-info {
            background-color: #2a2a1a;
            color: #ffd700;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            border-left: 4px solid #ffd700;
        }

        .first-user-info.show {
            display: block;
        }

        @media (max-width: 600px) {
            .login-container {
                margin: 20px;
                padding: 30px 20px;
            }

            .logo h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1> PDV Gold</h1>
            <p>Sistema de Ponto de Venda</p>
        </div>

        <!-- Abas de Login/Registro -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">
                Login
            </div>
            <div class="tab" onclick="switchTab('register')">
                Registrar
            </div>
        </div>

        <!-- Alertas -->
        <div id="alert" class="alert"></div>
        <div id="firstUserInfo" class="first-user-info">
            ℹ️ Nenhum usuário cadastrado. O primeiro usuário será <strong>ADMIN</strong>.
        </div>

        <!-- Formulário de Login -->
        <form id="loginForm" class="form-content active" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="loginUser">Usuário:</label>
                <input type="text" id="loginUser" name="usuario" required>
            </div>

            <div class="form-group">
                <label for="loginPass">Senha:</label>
                <input type="password" id="loginPass" name="senha" required>
            </div>

            <button type="submit">Entrar</button>
        </form>

        <!-- Formulário de Registro -->
        <form id="registerForm" class="form-content" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="registerUser">Criar Usuário:</label>
                <input type="text" id="registerUser" name="usuario" required>
            </div>

            <div class="form-group">
                <label for="registerPass">Crie uma Senha:</label>
                <input type="password" id="registerPass" name="senha" required>
            </div>

            <div class="form-group">
                <label for="registerPassConfirm">Confirme a Senha:</label>
                <input type="password" id="registerPassConfirm" name="senha_confirm" required>
            </div>

            <button type="submit">Registrar</button>
        </form>
    </div>

    <script>
        // Muda entre abas
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-content').forEach(f => f.classList.remove('active'));

            if (tab === 'login') {
                document.querySelector('[onclick*="login"]').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('[onclick*="register"]').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        // Exibe alertas
        function showAlert(message, type = 'info') {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert show alert-${type}`;

            setTimeout(() => {
                alert.classList.remove('show');
            }, 5000);
        }

        // Handle Login
        async function handleLogin(e) {
            e.preventDefault();

            const usuario = document.getElementById('loginUser').value;
            const senha = document.getElementById('loginPass').value;

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ usuario, senha })
                });

                const data = await response.json();

                if (data.status) {
                    showAlert(data.message, 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    showAlert(data.message, 'error');
                }
            } catch (error) {
                showAlert('Erro ao conectar com o servidor', 'error');
            }
        }

        // Handle Register
        async function handleRegister(e) {
            e.preventDefault();

            const usuario = document.getElementById('registerUser').value;
            const senha = document.getElementById('registerPass').value;
            const senhaConfirm = document.getElementById('registerPassConfirm').value;

            if (senha !== senhaConfirm) {
                showAlert('As senhas não coincidem!', 'error');
                return;
            }

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ usuario, senha })
                });

                const data = await response.json();

                if (data.status) {
                    showAlert(data.message + ` (${data.cargo})`, 'success');
                    document.getElementById('registerForm').reset();
                    setTimeout(() => {
                        switchTab('login');
                    }, 1500);
                } else {
                    showAlert(data.message, 'error');
                }
            } catch (error) {
                showAlert('Erro ao conectar com o servidor', 'error');
            }
        }

        // Verifica se é primeiro usuário
        async function checkFirstUser() {
            try {
                const response = await fetch('/api/check-first-user');
                const data = await response.json();

                if (data.is_first_user) {
                    document.getElementById('firstUserInfo').classList.add('show');
                }
            } catch (error) {
                console.log('Erro ao verificar primeiro usuário');
            }
        }

        // Executa ao carregar
        checkFirstUser();
    </script>
</body>
</html>
